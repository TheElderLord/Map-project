services:
  - type: web
    name: geo-places-backend
    runtime: node
    plan: free
    rootDir: geo-places-backend
    buildCommand: npm ci && npm run build
    startCommand: npm run migration:run:prod && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: geo-places-db
          property: connectionString
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_API_URL
        value: https://generativelanguage.googleapis.com/v1beta

  - type: web
    name: geo-places-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: geo-places-db
    plan: free
    databaseName: geo_places
    postgresMajorVersion: "17"
